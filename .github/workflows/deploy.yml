name: Deploy trailmark to tap
# Deploys trailmark as a 2nd app on the clan.lol box `tap`, coexisting with taprunning.
# tap's whole config is taprunning's `nixosConfigurations.tap`, so this builds + activates
# THAT closure with the trailmark input re-locked to this commit — taprunning's services
# are preserved (validated: the merged config evaluates to a valid system derivation).
# Explicit trigger only (never auto-deploy on every push). A release is cut by merging
# `main` into a `release-<date>` branch (e.g. release-2026-06-19); the bare `release`
# branch and manual workflow_dispatch also trigger. main/feature pushes never deploy.
on:
  workflow_dispatch:
  push:
    branches:
      - release
      - 'release-*'

permissions:
  contents: read

concurrency:
  group: deploy-tap # SHARE the lane with taprunning's own deploy — never two activations on one box
  cancel-in-progress: false

jobs:
  deploy:
    name: Build tap closure (with trailmark) + activate over SSH
    runs-on: ubuntu-latest # x86_64-linux native — matches nixosConfigurations.tap (no cross-build)
    timeout-minutes: 60
    steps:
      - name: Checkout trailmark
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: trailmark

      # The clan that owns `tap` lives in taprunning. id_github_indraakkk (DEPLOY_SSH_KEY)
      # can clone indraakkk/* over SSH. taprunning must already register the trailmark
      # module + instance (nix/infra.nix) — done.
      - name: Checkout taprunning (the clan that owns tap)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: indraakkk/taprunning
          ref: main
          ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}
          path: taprunning

      # clan commits inventory.json on the runner checkout; a fresh runner has no git identity.
      - name: Configure git identity
        run: |
          git config --global user.email "ci@trailmark.duckdns.org"
          git config --global user.name "trailmark-ci"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          determinate: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          extra-conf: |
            experimental-features = nix-command flakes
            extra-substituters = https://cache.clan.lol
            extra-trusted-public-keys = cache.clan.lol-1:3KztgSAB5R1M+Dz7vzkBGzXdodizbgLXGXKXlcQLA28=
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      # DEPLOY_SSH_KEY's public half is in tap's root authorizedKeys (verified: it is the
      # `…ARmc0KNpF indraakkk` key). clan activates over SSH to root@43.133.128.143.
      - name: Set up deploy SSH key (tap)
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<'EOF'
          Host 43.133.128.143
            StrictHostKeyChecking accept-new
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF
          chmod 600 ~/.ssh/config

      # Fail-fast: realise the trailmark x86_64-linux closure before driving activation.
      - name: Pre-deploy build proof (trailmark closure)
        working-directory: trailmark
        run: nix build .#packages.x86_64-linux.trailmark -L

      # Re-lock taprunning's `trailmark` input to this just-pushed commit, then build the
      # tap closure (with trailmark) in CI and activate over SSH. SOPS_AGE_KEY decrypts the
      # clan vars (must be in the sops admins/ci group). nixos-rebuild is put on PATH from
      # the locked nixpkgs (clan execs a bare `nixos-rebuild switch` on the build host).
      - name: Deploy (clan machines update tap)
        working-directory: taprunning
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          nix flake lock --update-input trailmark
          nix shell --inputs-from . nixpkgs#nixos-rebuild --command \
            nix run .#clan-cli -- machines update tap \
              --build-host localhost \
              --host-key-check none

      - name: Failure guidance
        if: failure()
        run: |
          echo "Deploy failed. Checklist: (1) GitHub secrets DEPLOY_SSH_KEY + SOPS_AGE_KEY set;"
          echo "(2) trailmark.duckdns.org A-record → 43.133.128.143 (ACME); (3) clan vars for"
          echo "trailmark generated + committed in taprunning (clan vars generate tap);"
          echo "(4) indraakkk/trailmark reachable as the taprunning flake input."
